<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Personal Website Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">

  <div class="header-top">

    <h1>Personal Website Gallery</h1>

    <a
      href="https://github.com/kousikkaranam/portfolio-templates"
      target="_blank"
      class="github-btn"
    >
      GitHub
    </a>

  </div>

  <p id="site-description">
    A curated collection of personal websites.
  </p>

</header>

<div class="controls">

  <input
    type="text"
    id="searchInput"
    placeholder="Search by name, role, or keyword..."
  >

  <select id="taglineFilter">
    <option value="all">All roles</option>
  </select>

</div>

<div id="alphabetFilter" class="alphabet-filter"></div>

<section id="portfolio-grid" class="portfolio-grid"></section>


<footer>

  <p>Open source • Built by
    <a href="https://kousikkaranam.is-a.dev" target="Portfolio">
      Kousik Karanam
    </a>
    •
    <a
      href="https://github.com/kousikkaranam"
      target="Github"
    >
      View more projects on GitHub
    </a>
  </p>

</footer>
<script src="script.js"></script>

</body>
</html>
